# General launching utilities
$bindsym $mod+space mode "APPS"
mode "APPS" {
    # Lauch main script (app launcher and others)
    $bindsym space exec $config/rofi/launch; mode "default"
    $bindsym $mod+space exec $config/rofi/launch; mode "default"
    # Lauch CMD script
    $bindsym Return exec $terminal --app-id cmd; mode "default"
    # Lauch script to kill processes
    $bindsym k exec $terminal --app-id kill -- fzf_kill; mode "default"
    $bindsym Shift+k exec $terminal --app-id kill -- fzf_kill SIGKILL; mode "default"
    # Lauch calendar
    $bindsym c exec $terminal --app-id calendar -- $open_calendar; mode "default"
    # Lauch Calc
    $bindsym m exec $terminal --app-id qalc -- qalc -t; mode "default"
    # Launch pulsemixer
    $bindsym v exec $terminal --app-id pulsemixer -- pulsemixer; mode "default"
    # Launch bluetui
    $bindsym b exec $terminal --app-id bluetui -- bluetui; mode "default"
    # Launch impala
    $bindsym n exec $terminal --app-id impala -- impala; mode "default"
    # Launch btop
    $bindsym h exec $terminal --app-id btop -- btop --preset 1; mode "default"
    # Launch tmp notepad
    $bindsym t exec $terminal --app-id scratchpad -- nvim "/tmp/tmp_$(date +%s)"; mode "default"
    # Launch MPV script
    $bindsym p exec $config/rofi/launch MPV; mode "default"
    # Open SPOTIFY mode
    $bindsym s mode "SPOTIFY"
    # Launch logout script
    $bindsym BackSpace exec wlogout -p layer-shell; mode "default"
    # Escape mode
    $bindsym Escape mode "default"
}

# Spotifyd and Spotify-TUI mode
mode "SPOTIFY" {
    # Run sptinit (start spotifyd and spt)
    $bindsym i exec $bin/sptinit; mode "default"
    # Run sptstop (stop spotifyd)
    $bindsym s exec $bin/sptstop; mode "default"
    # Escape mode
    $bindsym Escape mode "default"
}


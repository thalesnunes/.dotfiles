# =============================================
# DEFAULT MODE - Main Key Bindings
# =============================================
keymode=default

# Reload config
bind=SUPER+SHIFT,r,reload_config

# ---- Focus & Movement (Vim keys) ----
bind=SUPER,h,focusdir,left
bind=SUPER,j,focusdir,down
bind=SUPER,k,focusdir,up
bind=SUPER,l,focusdir,right

bind=SUPER+ALT,h,exchange_client,left
bind=SUPER+ALT,j,exchange_client,down
bind=SUPER+ALT,k,exchange_client,up
bind=SUPER+ALT,l,exchange_client,right

bind=SUPER,Tab,focusstack,next
bind=SUPER+SHIFT,Tab,focusstack,next

bind=ALT,Left,focusdir,left
bind=ALT,Right,focusdir,right
bind=ALT,Up,focusdir,up
bind=ALT,Down,focusdir,down

# ---- Monitor Focus ----
bind=SUPER,i,focusmon,left
bind=SUPER,o,focusmon,right
bind=SUPER+ALT,i,tagmon,left
bind=SUPER+ALT,o,tagmon,right

# ---- Resize ----
bind=SUPER,period,resizewin,+5,+0
bind=SUPER,comma,resizewin,-5,+0
bind=SUPER+ALT,period,resizewin,+0,+5
bind=SUPER+ALT,comma,resizewin,+0,-5

# ---- Tag Navigation ----
bind=SUPER,1,view,1
bind=SUPER,2,view,2
bind=SUPER,3,view,3
bind=SUPER,4,view,4
bind=SUPER,5,view,5
bind=SUPER,6,view,6
bind=SUPER,7,view,7
bind=SUPER,8,view,8
bind=SUPER,9,view,9
bind=SUPER,0,view,10

# ---- Move Windows to Tags ----
bind=SUPER+ALT,1,tag,1
bind=SUPER+ALT,2,tag,2
bind=SUPER+ALT,3,tag,3
bind=SUPER+ALT,4,tag,4
bind=SUPER+ALT,5,tag,5
bind=SUPER+ALT,6,tag,6
bind=SUPER+ALT,7,tag,7
bind=SUPER+ALT,8,tag,8
bind=SUPER+ALT,9,tag,9
bind=SUPER+ALT,0,tag,10

bind=SUPER+ALT,Left,tagtoleft,0
bind=SUPER+ALT,Right,tagtoright,0

bind=CTRL+SUPER,Left,tagtoleft,0
bind=CTRL+SUPER,Right,tagtoright,0

# ---- Move windows to tags without focusing ----
bind=ALT,1,tag,1
bind=ALT,2,tag,2
bind=ALT,3,tag,3
bind=ALT,4,tag,4
bind=ALT,5,tag,5
bind=ALT,6,tag,6
bind=ALT,7,tag,7
bind=ALT,8,tag,8
bind=ALT,9,tag,9

# ---- Window Operations ----
bind=SUPER,f,togglefullscreen
bind=SUPER+SHIFT,f,togglefloating
bind=SUPER,q,killclient
bind=SUPER+SHIFT,l,setlayout,tile
bind=SUPER+SHIFT,j,setlayout,tile
bind=SUPER,Tab,setlayout,tile
bind=SUPER,n,switch_layout

# bind=SUPER,g,toggleglobal
bind=ALT,Tab,toggleoverview
# bind=ALT,backslash,togglefloating
# bind=ALT,a,togglemaximizescreen
# bind=ALT,f,togglefullscreen
bind=ALT+SHIFT,f,togglefakefullscreen
# bind=SUPER,i,minimized
# bind=SUPER+SHIFT,i,restore_minimized
bind=ALT,z,toggle_scratchpad
# bind=SUPER,o,toggleoverlay

# ---- Launchers ----
bind=SUPER,backspace,spawn,footclient -- tmux_init
bind=SUPER,b,spawn,zen-browser -P 'Pessoal'
bind=SUPER,m,spawn,Telegram
bind=SUPER,e,spawn,footclient -- ranger
bind=SUPER+SHIFT,e,spawn,pcmanfm
bind=SUPER,v,spawn,~/.config/rofi/launch Clipboard

# ---- Apps mode ----
bind=SUPER,space,setkeymode,APPS

# ---- Screenshot mode ----
bind=SUPER,s,setkeymode,SCREENSHOT

# ---- Work mode ----
bind=SUPER,w,setkeymode,WORK

# ---- System ----
bind=SUPER+ALT,delete,spawn,swaylock
bind=SUPER+ALT,backspace,spawn,wlogout -p layer-shell

# ---- Media Keys (locked) ----
bindl=NONE,XF86AudioRaiseVolume,spawn,pulsemixer --change-volume +5 && ~/.local/bin/onscreen_bar Volume $(pulsemixer --get-volume)
bindl=NONE,XF86AudioLowerVolume,spawn,pulsemixer --change-volume -5 && ~/.local/bin/onscreen_bar Volume $(pulsemixer --get-volume)
bindl=NONE,XF86AudioMute,spawn,pulsemixer --toggle-mute
bindl=NONE,XF86AudioPlay,spawn,playerctl play-pause
bindl=NONE,XF86AudioPause,spawn,playerctl play-pause
bindl=NONE,XF86AudioNext,spawn,playerctl next
bindl=NONE,XF86AudioPrev,spawn,playerctl previous

bindl=NONE,XF86MonBrightnessUp,spawn,brightnessctl set +10% && ~/.local/bin/onscreen_bar Brightness $(echo "$(brightnessctl get) * 100 / $(brightnessctl max)" | bc)
bindl=NONE,XF86MonBrightnessDown,spawn,brightnessctl set 10%- && ~/.local/bin/onscreen_bar Brightness $(echo "$(brightnessctl get) * 100 / $(brightnessctl max)" | bc)
bindl=ALT,XF86MonBrightnessUp,spawn,brightnessctl set 100% && ~/.local/bin/onscreen_bar Brightness $(echo "$(brightnessctl get) * 100 / $(brightnessctl max)" | bc)
bindl=ALT,XF86MonBrightnessDown,spawn,brightnessctl set 0% && ~/.local/bin/onscreen_bar Brightness $(echo "$(brightnessctl get) * 100 / $(brightnessctl max)" | bc)

bind=NONE,XF86PowerOff,spawn,systemctl suspend

# ---- Notifications ----
bind=ALT,space,spawn,makoctl dismiss
bind=ALT+CTRL,space,spawn,makoctl dismiss --all
bind=ALT+CTRL,h,spawn,makoctl restore


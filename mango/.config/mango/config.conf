# Main MangoWM configuration
#
# Config files are split into subdirectories matching the Sway layout:
#   config/        - General settings, window rules, autostart
#   inputs/        - Keyboard and touchpad configuration
#   outputs/       - Monitor rules (symlink screen.conf to your setup)
#   modes/         - Keybinding modes

source=./config/settings.conf
source=./config/dracula_theme.conf
source=./config/window-rules.conf
source=./config/autostart.conf

source=./inputs/default-keyboard.conf
source=./inputs/default-touchpad.conf

source=./outputs/screen.conf

source=./modes/default.conf
source=./modes/apps.conf
source=./modes/screenshot.conf
source=./modes/work.conf
